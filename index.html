<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推し活記録帳</title>
<style>
  :root{
    --paper:#f2f0e6;
    --paper-line:#dcd8c8;
    --ink:#242a3b;
    --ink-soft:#565f77;
    --stamp-red:#b23a48;
    --teal:#2f6f6a;
    --mustard:#c98a2c;
    --purple:#6a3fa0;
    --card:#fbfaf5;
    --shadow: 0 1px 2px rgba(36,42,59,0.08), 0 4px 10px rgba(36,42,59,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Sans","Yu Gothic",sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  header.top{
    background:var(--ink);
    color:var(--paper);
    padding:18px 16px 14px;
    position:sticky;
    top:0;
    z-index:20;
    box-shadow:var(--shadow);
  }
  header.top h1{
    margin:0 0 2px;
    font-size:19px;
    letter-spacing:0.04em;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  header.top h1 .stamp{
    display:inline-block;
    border:1.5px solid var(--stamp-red);
    color:#f0a3ab;
    border-radius:4px;
    padding:1px 6px;
    font-size:11px;
    letter-spacing:0.1em;
    transform:rotate(-4deg);
  }
  header.top p{margin:0;font-size:11.5px;color:#b7bccb;}

  nav.tabs{
    display:flex;
    overflow-x:auto;
    gap:6px;
    padding:10px 12px 0;
    background:var(--ink);
    position:sticky;
    top:62px;
    z-index:19;
  }
  nav.tabs button{
    flex:0 0 auto;
    background:#333a52;
    color:#cfd3e2;
    border:none;
    padding:9px 14px;
    border-radius:10px 10px 0 0;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  nav.tabs button.active{
    background:var(--paper);
    color:var(--ink);
    font-weight:700;
  }

  main{max-width:760px;margin:0 auto;padding:16px 12px 60px;}

  .card{
    background:var(--card);
    border:1px solid var(--paper-line);
    border-radius:12px;
    padding:14px 14px 16px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
  }
  .card h2{margin:0 0 10px;font-size:15px;color:var(--ink);}
  .card h3{margin:0 0 8px;font-size:13.5px;color:var(--ink-soft);font-weight:700;}

  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .cal-header .month-label{font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;display:flex;gap:6px;}
  .cal-header .month-label select{
    font-weight:700;font-size:14px;color:var(--ink);border:1px solid var(--paper-line);border-radius:6px;
    padding:4px 4px;background:#fff;font-variant-numeric:tabular-nums;
  }
  .cal-header button{
    background:none;border:1px solid var(--paper-line);border-radius:8px;
    width:32px;height:32px;font-size:15px;color:var(--ink);cursor:pointer;
  }
  table.calendar{width:100%;border-collapse:collapse;table-layout:fixed;}
  table.calendar th{
    font-size:11px;color:var(--ink-soft);font-weight:600;padding:4px 0;
  }
  table.calendar td{
    height:56px;
    vertical-align:top;
    border:1px solid var(--paper-line);
    padding:3px 4px;
    cursor:pointer;
    font-size:12px;
    position:relative;
  }
  table.calendar td.empty{background:repeating-linear-gradient(45deg,#eeece1,#eeece1 4px,#f2f0e6 4px,#f2f0e6 8px);cursor:default;}
  table.calendar td.today{outline:2px solid var(--mustard);outline-offset:-2px;}
  table.calendar td.selected{background:#e7e2cd;}
  table.calendar td .d{font-variant-numeric:tabular-nums;color:var(--purple);}
  table.calendar td .badge{
    display:block;margin-top:3px;font-size:10.5px;font-weight:700;color:#fff;
    background:var(--purple);border-radius:6px;padding:1px 4px;text-align:center;
    font-variant-numeric:tabular-nums;
  }
  table.calendar td.sun .d{color:var(--purple);}

  .month-total-badge{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:linear-gradient(135deg, var(--purple), #8a5fc2);
    color:#fff;
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:10px;
    box-shadow:0 2px 6px rgba(106,63,160,0.35);
  }
  .month-total-badge .month-total-label{
    font-size:12.5px;
    font-weight:700;
    opacity:0.9;
    letter-spacing:0.02em;
  }
  .month-total-badge .month-total-value{
    font-size:22px;
    font-weight:800;
    font-variant-numeric:tabular-nums;
  }

  table.calendar td.sat .d{color:var(--purple);}

  .day-panel{border-top:2px dashed var(--paper-line);margin-top:12px;padding-top:12px;}
  .day-panel .date-title{font-weight:700;margin-bottom:8px;font-size:14px;}

  .entry-row{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    background:#fff;border:1px solid var(--paper-line);border-radius:8px;
    padding:8px 10px;margin-bottom:6px;font-size:12.5px;
  }
  .entry-row .info{flex:1;}
  .entry-row .info .line1{font-weight:700;}
  .entry-row .info .line2{color:var(--ink-soft);font-size:11.5px;margin-top:2px;}
  .entry-row .money{font-variant-numeric:tabular-nums;color:var(--stamp-red);font-weight:700;white-space:nowrap;}
  .entry-row .actions{display:flex;gap:4px;}
  .entry-row .actions button{
    border:none;background:var(--paper);border-radius:6px;padding:5px 8px;font-size:11px;cursor:pointer;
  }

  form.entry-form{margin-top:10px;}
  form.entry-form .row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  form.entry-form label{
    display:flex;flex-direction:column;font-size:11px;color:var(--ink-soft);gap:3px;flex:1;min-width:120px;
  }
  form.entry-form input,form.entry-form select{
    font-size:14px;padding:8px 8px;border:1px solid var(--paper-line);border-radius:8px;background:#fff;color:var(--ink);
  }
  .preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .preset-row button{
    border:1px solid var(--paper-line);background:#fff;border-radius:20px;padding:5px 10px;font-size:11.5px;cursor:pointer;color:var(--ink-soft);
  }
  .preset-row button.active{background:var(--teal);color:#fff;border-color:var(--teal);}
  .submit-btn{
    background:var(--ink);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13.5px;font-weight:700;cursor:pointer;
  }
  .cancel-edit{background:none;border:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;cursor:pointer;margin-left:10px;}

  .chart-wrap{
    background:#fff;border:1px solid var(--paper-line);border-radius:10px;
    padding:10px 6px 4px;margin-bottom:14px;
  }
  .count-chart-svg{width:100%;height:auto;display:block;}

  .group-title-row{
    display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:4px;
  }
  .group-title-row h2{margin:0;}
  .danger-outline-btn{
    background:#fff;color:var(--stamp-red);border:1.5px solid var(--stamp-red);border-radius:20px;
    padding:5px 12px;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap;
  }

  .advance-toggle-btn{
    background:#fff;color:var(--purple);border:1.5px solid var(--purple);border-radius:20px;
    padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;
  }
  .advance-toggle-btn.active{background:var(--purple);color:#fff;}
  .advance-block{
    margin-top:8px;padding:10px;border:1px dashed var(--purple);border-radius:10px;background:#f7f2fb;
  }
  .advance-block .preset-row button[data-advance-fee].active{background:var(--purple);color:#fff;border-color:var(--purple);}
  .cat-tag.cat-advance{background:var(--purple);}

  .agg-controls{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
  .agg-controls select,.agg-controls input{padding:7px 8px;border-radius:8px;border:1px solid var(--paper-line);font-size:13px;}
  .totals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .total-box{background:#fff;border:1px solid var(--paper-line);border-radius:10px;padding:10px 12px;}
  .total-box .label{font-size:11px;color:var(--ink-soft);margin-bottom:4px;}
  .total-box .value{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;}
  .total-box.money .value{color:var(--stamp-red);}
  .total-box.time .value{color:var(--teal);}
  .total-box.count .value{color:var(--mustard);}

  table.breakdown{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px;}
  table.breakdown th,table.breakdown td{border:1px solid var(--paper-line);padding:6px 8px;text-align:right;}
  table.breakdown th:first-child,table.breakdown td:first-child{text-align:left;}
  table.breakdown thead th{background:#eeece1;}

  .list-table-wrap{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    border:1px solid var(--paper-line);
    border-radius:8px;
  }
  table.list-table{
    width:100%;
    min-width:820px;
  }

  .pagination{
    display:flex;align-items:center;justify-content:center;gap:14px;margin-top:12px;
  }
  .pagination button{
    background:var(--ink);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12.5px;cursor:pointer;
  }
  .pagination button:disabled{background:#c9c6ba;cursor:not-allowed;}
  .pagination .page-info{font-size:12.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums;}

  .datamgmt .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .datamgmt button, .datamgmt label.file-btn{
    background:var(--ink);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;display:inline-block;
  }
  .datamgmt button.danger{background:var(--stamp-red);}
  .datamgmt input[type=file]{display:none;}
  .hint{font-size:11.5px;color:var(--ink-soft);line-height:1.6;}
  .empty-msg{color:var(--ink-soft);font-size:12.5px;padding:10px 0;}
  .cat-tag{display:inline-block;padding:1px 6px;border-radius:6px;font-size:10.5px;color:#fff;margin-right:4px;}
  .cat-hapica-kind{background:var(--mustard);}
</style>
</head>
<body>

<header class="top">
  <h1>推し活記録帳 <span class="stamp">LEDGER</span></h1>
  <p>2ショット・手売り・握手・ハピカを日付ごとに記録</p>
</header>

<nav class="tabs" id="tabNav"></nav>

<main id="app"></main>

<script>
/* =========================================================
   データ定義
========================================================= */
const STORAGE_KEY = 'oshiRecordAppData_v1';

const TYPE_CONFIG = {
  '2shot': {
    label: '2ショット',
    hasSeconds: true,
    defaultPrice: 1500,
    defaultSeconds: 30,
    pricePresets: [1500,1720,1200,2000],
    secondsPresets: [30,60],
    hasAdvance: true,
    advanceFeeOptions: [220,110],
    defaultAdvanceFee: 220
  },
  'tenuri': {
    label: '手売り',
    hasSeconds: true,
    defaultPrice: 6000,
    defaultSeconds: 120,
    pricePresets: [],
    secondsPresets: []
  },
  'akushu': {
    label: '握手',
    hasSeconds: true,
    defaultPrice: 1000,
    defaultSeconds: 10,
    pricePresets: [],
    secondsPresets: []
  },
  'hapica': {
    label: 'ハピカ',
    hasSeconds: false,
    hasKind: true,
    kindLabel: 'ハピカの種類',
    defaultPrice: 500,
    pricePresets: []
  }
};
const TYPE_ORDER = ['2shot','tenuri','akushu','hapica'];
const DEFAULT_HAPICA_KINDS = [];
const LEGACY_HAPICA_KIND_MAP = { nekomimi: '猫耳', metsumuri: '目つむり', other: 'その他' };
const LEGACY_DEFAULT_KIND_NAMES = ['猫耳', '目つむり', 'その他'];

/* =========================================================
   ストレージ
========================================================= */
function loadStore(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return { records: [], venues: [], majorCategories: [], minorCategories: [], hapicaKinds: DEFAULT_HAPICA_KINDS.slice() };
    const parsed = JSON.parse(raw);
    if(Array.isArray(parsed)){
      // 旧形式（記録の配列のみ）からの移行
      return { records: parsed, venues: [], majorCategories: [], minorCategories: [], hapicaKinds: DEFAULT_HAPICA_KINDS.slice() };
    }
    let majorCategories = Array.isArray(parsed.majorCategories) ? parsed.majorCategories : [];
    let minorCategories = Array.isArray(parsed.minorCategories) ? parsed.minorCategories : [];
    let recordsList = Array.isArray(parsed.records) ? parsed.records : [];
    let hapicaKinds = Array.isArray(parsed.hapicaKinds) ? parsed.hapicaKinds.slice() : DEFAULT_HAPICA_KINDS.slice();

    // 旧バージョン（大小の区別がないフラットなカテゴリ）からの移行
    if(majorCategories.length===0 && Array.isArray(parsed.eventCategories) && parsed.eventCategories.length>0){
      majorCategories = parsed.eventCategories.map(c=>({ id: c.id, name: c.name }));
      recordsList = recordsList.map(r=>{
        if(r.categoryId && !r.categoryMajorId){
          const clone = Object.assign({}, r);
          clone.categoryMajorId = r.categoryId;
          return clone;
        }
        return r;
      });
    }

    // 旧バージョン（固定キーのハピカ種類）からの移行
    recordsList = recordsList.map(r=>{
      if(r.type==='hapica' && r.hapicaCategory && LEGACY_HAPICA_KIND_MAP[r.hapicaCategory]){
        const clone = Object.assign({}, r);
        clone.hapicaCategory = LEGACY_HAPICA_KIND_MAP[r.hapicaCategory];
        return clone;
      }
      return r;
    });

    // 以前の初期設定だった「猫耳／目つむり／その他」は、実際の記録で
    // 使われていなければ選択肢から取り除く（ユーザーが追加した種類は残す）
    const usedKindNames = new Set(
      recordsList.filter(r => r.type==='hapica' && r.hapicaCategory).map(r => r.hapicaCategory)
    );
    hapicaKinds = hapicaKinds.filter(k => !LEGACY_DEFAULT_KIND_NAMES.includes(k) || usedKindNames.has(k));

    return {
      records: recordsList,
      venues: Array.isArray(parsed.venues) ? parsed.venues : [],
      majorCategories,
      minorCategories,
      hapicaKinds
    };
  }catch(e){
    console.error('load error', e);
    return { records: [], venues: [], majorCategories: [], minorCategories: [], hapicaKinds: DEFAULT_HAPICA_KINDS.slice() };
  }
}
function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ records, venues, majorCategories, minorCategories, hapicaKinds }));
  }catch(e){
    alert('保存に失敗しました。ブラウザのストレージが利用できない可能性があります。');
    console.error(e);
  }
}

const _store = loadStore();
let records = _store.records;
let venues = _store.venues;
let majorCategories = _store.majorCategories;
let minorCategories = _store.minorCategories;
let hapicaKinds = _store.hapicaKinds;

function uid(){
  return 'r_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
}

function findVenue(id){ return venues.find(v=>v.id===id) || null; }
function findMajorCategory(id){ return majorCategories.find(c=>c.id===id) || null; }
function findMinorCategory(id){ return minorCategories.find(c=>c.id===id) || null; }

/* =========================================================
   状態
========================================================= */
const today = new Date();
const state = {
  tab: '2shot',
  cal: {}, // type -> {y,m}
  selectedDate: {}, // type -> 'YYYY-MM-DD'
  editingId: {}, // type -> id or null
};
TYPE_ORDER.forEach(t=>{
  state.cal[t] = { y: today.getFullYear(), m: today.getMonth() };
  state.selectedDate[t] = null;
  state.editingId[t] = null;
});

const aggState = { mode:'month', y: today.getFullYear(), m: today.getMonth()+1 };

const venueState = { editingId: null, page: 1, pageSize: 20, search: '' };
const categoryState = { majorEditingId: null, minorEditingId: null, majorPage: 1, minorPage: 1, pageSize: 20, majorSearch: '', minorSearch: '' };
const listState = { type: 'all', venueId: 'all', city: 'all', majorId: 'all', minorId: 'all', sort: 'desc', page: 1, pageSize: 20 };
const hapicaListState = { venueId: 'all', city: 'all', sort: 'desc' };

/* =========================================================
   ユーティリティ
========================================================= */
function pad2(n){ return n < 10 ? '0'+n : ''+n; }
function toDateStr(y,m,d){ return y+'-'+pad2(m+1)+'-'+pad2(d); }
function formatYen(n){ return '¥' + Math.round(n).toLocaleString('ja-JP'); }
function formatNumber(n){ return Math.round(n).toLocaleString('ja-JP'); }
function formatSeconds(sec){
  sec = Math.round(sec);
  const m = Math.floor(sec/60);
  const s = sec%60;
  if(m===0) return sec + '秒';
  return m + '分' + (s>0 ? s+'秒' : '') + '（' + sec + '秒）';
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function paginate(list, page, pageSize){
  const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
  const safePage = Math.min(Math.max(1, page), totalPages);
  const start = (safePage - 1) * pageSize;
  return { items: list.slice(start, start + pageSize), totalPages, page: safePage };
}
function paginationControlsHtml(prefix, page, totalPages){
  return `
    <div class="pagination">
      <button type="button" data-page-prev="${prefix}" ${page<=1?'disabled':''}>＜ 前へ</button>
      <span class="page-info">${page} / ${totalPages} ページ</span>
      <button type="button" data-page-next="${prefix}" ${page>=totalPages?'disabled':''}>次へ ＞</button>
    </div>
  `;
}

/* =========================================================
   ナビゲーション描画
========================================================= */
function renderNav(){
  const nav = document.getElementById('tabNav');
  const tabs = [
    ...TYPE_ORDER.map(t => ({ key:t, label: TYPE_CONFIG[t].label })),
    { key:'list', label:'一覧' },
    { key:'hapicaList', label:'ハピカ一覧' },
    { key:'venues', label:'会場' },
    { key:'categories', label:'カテゴリ' },
    { key:'agg', label:'集計' },
    { key:'data', label:'データ管理' }
  ];
  nav.innerHTML = tabs.map(t =>
    `<button data-tab="${t.key}" class="${state.tab===t.key?'active':''}">${t.label}</button>`
  ).join('');
  nav.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.tab = btn.dataset.tab;
      renderNav();
      renderMain();
    });
  });
}

/* =========================================================
   メイン描画振り分け
========================================================= */
function renderMain(){
  const app = document.getElementById('app');
  if(TYPE_ORDER.includes(state.tab)){
    app.innerHTML = renderRecordTabHtml(state.tab);
    attachRecordTabEvents(state.tab);
  }else if(state.tab === 'agg'){
    app.innerHTML = renderAggTabHtml();
    attachAggEvents();
  }else if(state.tab === 'data'){
    app.innerHTML = renderDataTabHtml();
    attachDataEvents();
  }else if(state.tab === 'venues'){
    app.innerHTML = renderVenuesTabHtml();
    attachVenuesEvents();
  }else if(state.tab === 'categories'){
    app.innerHTML = renderCategoriesTabHtml();
    attachCategoriesEvents();
  }else if(state.tab === 'list'){
    app.innerHTML = renderListTabHtml();
    attachListEvents();
  }else if(state.tab === 'hapicaList'){
    app.innerHTML = renderHapicaListTabHtml();
    attachHapicaListEvents();
  }
}

// renderMain()は画面全体を作り直すため、そのまま呼ぶとテキスト入力中の
// フォーカスが外れてスマホのキーボードが閉じてしまう。
// 入力欄からの呼び出しはこちらでフォーカス位置を保ったまま再描画する。
function renderMainKeepFocus(){
  const active = document.activeElement;
  let focusInfo = null;
  if(active && active.id && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')){
    focusInfo = { id: active.id, selStart: active.selectionStart, selEnd: active.selectionEnd };
  }
  renderMain();
  if(focusInfo){
    const el = document.getElementById(focusInfo.id);
    if(el){
      el.focus();
      if(typeof el.setSelectionRange === 'function'){
        try{ el.setSelectionRange(focusInfo.selStart, focusInfo.selEnd); }catch(e){}
      }
    }
  }
}

/* =========================================================
   記録タブ（2ショット/手売り/握手/ハピカ 共通）
========================================================= */
function getEntriesForDate(type, dateStr){
  return records.filter(r => r.type===type && r.date===dateStr);
}
function getLastSettingsForDate(type, dateStr){
  const list = getEntriesForDate(type, dateStr);
  if(list.length===0) return null;
  return list[list.length-1];
}

function renderRecordTabHtml(type){
  const cfg = TYPE_CONFIG[type];
  const cal = state.cal[type];
  const selDate = state.selectedDate[type];

  return `
    <div class="card">
      <h2>${cfg.label} — カレンダー</h2>
      ${renderCalendarHtml(type, cal.y, cal.m)}
    </div>
    <div class="card">
      ${selDate ? renderDayPanelHtml(type, selDate) : '<p class="empty-msg">カレンダーの日付をタップすると、記録の追加・編集ができます。</p>'}
    </div>
  `;
}

function renderCalendarHtml(type, y, m){
  const cfg = TYPE_CONFIG[type];
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayStr = toDateStr(today.getFullYear(), today.getMonth(), today.getDate());
  const selDate = state.selectedDate[type];

  let monthTotalCount = 0;
  let cells = [];
  for(let i=0;i<startDow;i++) cells.push('<td class="empty"></td>');
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = toDateStr(y,m,d);
    const dow = new Date(y,m,d).getDay();
    const entries = getEntriesForDate(type, dateStr);
    const count = entries.reduce((s,e)=>s+Number(e.count||0)+((e.isAdvance && e.advanceCount)?Number(e.advanceCount):0),0);
    monthTotalCount += count;
    let cls = [];
    if(dow===0) cls.push('sun');
    if(dow===6) cls.push('sat');
    if(dateStr===todayStr) cls.push('today');
    if(dateStr===selDate) cls.push('selected');
    cells.push(`<td class="${cls.join(' ')}" data-date="${dateStr}">
        <span class="d">${d}</span>
        ${count>0 ? `<span class="badge">${count}枚</span>` : ''}
      </td>`);
  }
  // pad trailing
  while(cells.length % 7 !== 0) cells.push('<td class="empty"></td>');

  let rows = '';
  for(let i=0;i<cells.length;i+=7){
    rows += '<tr>' + cells.slice(i,i+7).join('') + '</tr>';
  }

  const monthLabel = y + '年 ' + (m+1) + '月';
  const yearOptions = [];
  for(let yr = today.getFullYear()-12; yr <= today.getFullYear()+2; yr++) yearOptions.push(yr);

  return `
    <div class="cal-header">
      <button data-cal-nav="prev" data-type="${type}">＜</button>
      <span class="month-label">
        <select data-cal-year="${type}">
          ${yearOptions.map(yr=>`<option value="${yr}" ${yr===y?'selected':''}>${yr}年</option>`).join('')}
        </select>
        <select data-cal-month="${type}">
          ${Array.from({length:12},(_,i)=>i+1).map(mm=>`<option value="${mm-1}" ${mm-1===m?'selected':''}>${mm}月</option>`).join('')}
        </select>
      </span>
      <button data-cal-nav="next" data-type="${type}">＞</button>
    </div>
    <div class="month-total-badge">
      <span class="month-total-label">${m+1}月の合計</span>
      <span class="month-total-value">${formatNumber(monthTotalCount)}枚</span>
    </div>
    <table class="calendar">
      <thead><tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function renderDayPanelHtml(type, dateStr){
  const cfg = TYPE_CONFIG[type];
  const entries = getEntriesForDate(type, dateStr);
  const editingId = state.editingId[type];
  const editingEntry = editingId ? records.find(r=>r.id===editingId) : null;

  const lastSetting = getLastSettingsForDate(type, dateStr);
  const defaultPrice = editingEntry ? editingEntry.unitPrice
    : (lastSetting ? lastSetting.unitPrice : cfg.defaultPrice);
  const defaultSeconds = cfg.hasSeconds ? (editingEntry ? editingEntry.unitSeconds
    : (lastSetting ? lastSetting.unitSeconds : cfg.defaultSeconds)) : null;
  const defaultVenueId = editingEntry ? (editingEntry.venueId||'') : (lastSetting ? (lastSetting.venueId||'') : '');
  const defaultMajorId = editingEntry ? (editingEntry.categoryMajorId||'') : (lastSetting ? (lastSetting.categoryMajorId||'') : '');
  const defaultMinorId = editingEntry ? (editingEntry.categoryMinorId||'') : (lastSetting ? (lastSetting.categoryMinorId||'') : '');
  const defaultEvent = editingEntry ? editingEntry.event : (lastSetting ? lastSetting.event : '');

  let entriesHtml = '';
  if(entries.length===0){
    entriesHtml = '<p class="empty-msg">この日の記録はまだありません。</p>';
  }else{
    entriesHtml = entries.map(e=>{
      const hasAdv = cfg.hasAdvance && e.isAdvance && Number(e.advanceCount) > 0;
      const money = Number(e.count) * Number(e.unitPrice) + (hasAdv ? Number(e.advanceCount) * Number(e.advancePrice) : 0);
      let line2 = '';
      if(cfg.hasSeconds){
        line2 = `${e.unitPrice}円/枚 ・ ${e.unitSeconds}秒/枚`;
      }else if(cfg.hasKind){
        const catLabel = e.hapicaCategory || 'その他';
        line2 = `<span class="cat-tag cat-hapica-kind">${escapeHtml(catLabel)}</span>${e.unitPrice}円/枚`;
      }
      const advLine = hasAdv
        ? `<div class="line2"><span class="cat-tag cat-advance">前売り</span>${e.advanceCount}枚 ・ ${e.advancePrice}円/枚（手数料+${e.advanceFee}円込み）</div>`
        : '';
      const venue = e.venueId ? findVenue(e.venueId) : null;
      const venueLabel = venue ? venue.name + (venue.city ? `（${venue.city}）` : '') : (e.location || '会場未設定');
      const evMajor = e.categoryMajorId ? findMajorCategory(e.categoryMajorId) : null;
      const evMinor = e.categoryMinorId ? findMinorCategory(e.categoryMinorId) : null;
      const evCatLabel = evMajor ? `【${escapeHtml(evMajor.name)}${evMinor ? '／'+escapeHtml(evMinor.name) : ''}】` : '';
      return `
        <div class="entry-row">
          <div class="info">
            <div class="line1">${escapeHtml(venueLabel)} ／ ${evCatLabel}${escapeHtml(e.event||'（イベント未記入）')} ・ ${e.count}枚</div>
            <div class="line2">${line2}</div>
            ${advLine}
          </div>
          <div class="money">${formatYen(money)}</div>
          <div class="actions">
            <button data-edit="${e.id}" data-type="${type}">編集</button>
            <button data-delete="${e.id}" data-type="${type}">削除</button>
          </div>
        </div>
      `;
    }).join('');
  }

  const presetPriceHtml = cfg.pricePresets && cfg.pricePresets.length ? `
    <div class="preset-row">
      ${cfg.pricePresets.map(p=>`<button type="button" data-preset-price="${p}" class="${Number(defaultPrice)===p?'active':''}">${p}円</button>`).join('')}
    </div>` : '';
  const presetSecondsHtml = cfg.secondsPresets && cfg.secondsPresets.length ? `
    <div class="preset-row">
      ${cfg.secondsPresets.map(s=>`<button type="button" data-preset-seconds="${s}" class="${Number(defaultSeconds)===s?'active':''}">${s}秒</button>`).join('')}
    </div>` : '';

  const defaultHapicaKind = editingEntry ? (editingEntry.hapicaCategory || '')
    : (lastSetting ? (lastSetting.hapicaCategory || '') : (hapicaKinds[0] || ''));
  const hapicaKindHtml = cfg.hasKind ? (hapicaKinds.length > 0 ? `
    <label>${cfg.kindLabel}
      <select name="hapicaCategory" data-hapica-kind-select>
        ${hapicaKinds.map(k=>`<option value="${escapeHtml(k)}" ${defaultHapicaKind===k?'selected':''}>${escapeHtml(k)}</option>`).join('')}
      </select>
    </label>` : `
    <label>${cfg.kindLabel}
      <select name="hapicaCategory" data-hapica-kind-select disabled>
        <option value="">まだ種類が登録されていません</option>
      </select>
    </label>`) : '';
  const hapicaKindAddHtml = cfg.hasKind ? `
    <div class="row">
      <label>新しい種類を追加
        <input type="text" data-new-hapica-kind placeholder="例：限定衣装">
      </label>
      <button type="button" class="advance-toggle-btn" data-add-hapica-kind style="align-self:flex-end;">＋ 種類を追加</button>
    </div>` : '';

  const secondsFieldHtml = cfg.hasSeconds ? `
    <label>1枚あたりの秒数
      <input type="number" name="unitSeconds" min="0" step="1" value="${defaultSeconds}">
    </label>` : '';

  const venueSelectHtml = venues.length > 0 ? `
    <label>会場
      <select name="venueId">
        <option value="">（未設定）</option>
        ${venues.map(v=>`<option value="${v.id}" ${defaultVenueId===v.id?'selected':''}>${escapeHtml(v.name)}${v.city ? '（'+escapeHtml(v.city)+'）' : ''}</option>`).join('')}
      </select>
    </label>` : `
    <label>会場
      <select name="venueId" disabled>
        <option value="">まだ会場が登録されていません</option>
      </select>
    </label>`;

  const majorSelectHtml = majorCategories.length > 0 ? `
    <label>大カテゴリ
      <select name="categoryMajorId" data-major-select>
        <option value="">（未設定）</option>
        ${majorCategories.map(m=>`<option value="${m.id}" ${defaultMajorId===m.id?'selected':''}>${escapeHtml(m.name)}</option>`).join('')}
      </select>
    </label>` : `
    <label>大カテゴリ
      <select name="categoryMajorId" disabled>
        <option value="">まだ大カテゴリが登録されていません</option>
      </select>
    </label>`;

  const minorsForDefault = minorCategories.filter(m=>m.majorId===defaultMajorId);
  const minorSelectHtml = `
    <label>小カテゴリ
      <select name="categoryMinorId" data-minor-select>
        <option value="">（未設定）</option>
        ${minorsForDefault.map(m=>`<option value="${m.id}" ${defaultMinorId===m.id?'selected':''}>${escapeHtml(m.name)}</option>`).join('')}
      </select>
    </label>`;

  let advanceHtml = '';
  if(cfg.hasAdvance){
    const isAdvance = editingEntry ? !!editingEntry.isAdvance : false;
    const advanceFee = editingEntry && editingEntry.advanceFee ? editingEntry.advanceFee : cfg.defaultAdvanceFee;
    const advanceCount = editingEntry && editingEntry.advanceCount ? editingEntry.advanceCount : 1;
    const advancePrice = editingEntry && editingEntry.advancePrice
      ? editingEntry.advancePrice
      : (Number(defaultPrice) + Number(advanceFee));
    advanceHtml = `
      <div class="row">
        <button type="button" class="advance-toggle-btn ${isAdvance?'active':''}" data-advance-toggle>${isAdvance ? '前売り：ON' : '前売り：OFF'}</button>
      </div>
      <input type="hidden" name="isAdvance" value="${isAdvance ? 1 : 0}">
      <div class="advance-block" data-advance-block style="${isAdvance ? '' : 'display:none;'}">
        <div class="row">
          <label>前売り枚数
            <input type="number" name="advanceCount" min="0" step="1" value="${advanceCount}">
          </label>
          <label>前売り単価（円）
            <input type="number" name="advancePrice" min="0" step="1" value="${advancePrice}">
          </label>
        </div>
        <div class="preset-row">
          ${cfg.advanceFeeOptions.map(f=>
            `<button type="button" data-advance-fee="${f}" class="${Number(advanceFee)===f?'active':''}">手数料+${f}円</button>`
          ).join('')}
        </div>
        <p class="hint">前売り単価には手数料込みの金額を入力してください（デフォルトは基本単価＋選択した手数料）。</p>
      </div>
    `;
  }

  return `
    <div class="day-panel">
      <div class="date-title">${dateStr} の記録（${cfg.label}）</div>
      ${entriesHtml}
      <form class="entry-form" data-type="${type}" data-date="${dateStr}" data-editing="${editingId||''}">
        <h3>${editingEntry ? '記録を編集' : '記録を追加'}</h3>
        <div class="row">
          ${venueSelectHtml}
        </div>
        <div class="row">
          ${majorSelectHtml}
          ${minorSelectHtml}
        </div>
        <div class="row">
          <label>イベント名
            <input type="text" name="event" value="${escapeHtml(defaultEvent)}" placeholder="例：〇〇単独握手会">
          </label>
        </div>
        <div class="row">
          <label>枚数
            <input type="number" name="count" min="1" step="1" value="${editingEntry ? editingEntry.count : 1}">
          </label>
          <label>1枚あたりの金額（円）
            <input type="number" name="unitPrice" min="0" step="1" value="${defaultPrice}">
          </label>
        </div>
        ${presetPriceHtml}
        ${cfg.hasSeconds ? `<div class="row">${secondsFieldHtml}</div>${presetSecondsHtml}` : ''}
        ${hapicaKindHtml ? `<div class="row">${hapicaKindHtml}</div>${hapicaKindAddHtml}` : ''}
        ${advanceHtml}
        <button type="submit" class="submit-btn">${editingEntry ? '更新する' : '追加する'}</button>
        ${editingEntry ? '<button type="button" class="cancel-edit" data-cancel-edit data-type="'+type+'">編集をやめる</button>' : ''}
      </form>
      <p class="hint">会場・カテゴリの新規作成は上部ナビの「会場」「カテゴリ」タブから行えます。</p>
    </div>
  `;
}

function attachRecordTabEvents(type){
  const app = document.getElementById('app');

  // カレンダー月移動
  app.querySelectorAll('[data-cal-nav]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const dir = btn.dataset.calNav;
      const cal = state.cal[type];
      let ny = cal.y, nm = cal.m + (dir==='next' ? 1 : -1);
      if(nm < 0){ nm = 11; ny--; }
      if(nm > 11){ nm = 0; ny++; }
      state.cal[type] = { y: ny, m: nm };
      renderMain();
    });
  });

  // カレンダー 年・月の直接選択
  const calYearSel = app.querySelector(`[data-cal-year="${type}"]`);
  if(calYearSel){
    calYearSel.addEventListener('change', ()=>{
      state.cal[type] = { y: Number(calYearSel.value), m: state.cal[type].m };
      renderMain();
    });
  }
  const calMonthSel = app.querySelector(`[data-cal-month="${type}"]`);
  if(calMonthSel){
    calMonthSel.addEventListener('change', ()=>{
      state.cal[type] = { y: state.cal[type].y, m: Number(calMonthSel.value) };
      renderMain();
    });
  }

  // 日付選択
  app.querySelectorAll('td[data-date]').forEach(td=>{
    td.addEventListener('click', ()=>{
      state.selectedDate[type] = td.dataset.date;
      state.editingId[type] = null;
      renderMain();
    });
  });

  // 編集ボタン
  app.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.editingId[type] = btn.dataset.edit;
      renderMain();
    });
  });

  // 削除ボタン
  app.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(!confirm('この記録を削除しますか？')) return;
      records = records.filter(r=>r.id!==btn.dataset.delete);
      saveData();
      renderMain();
    });
  });

  // 編集キャンセル
  app.querySelectorAll('[data-cancel-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.editingId[type] = null;
      renderMain();
    });
  });

  // プリセットボタン（金額）－ 画面全体は再描画せず、値と選択状態だけ更新
  app.querySelectorAll('[data-preset-price]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const form = btn.closest('form');
      form.querySelector('[name=unitPrice]').value = btn.dataset.presetPrice;
      btn.parentElement.querySelectorAll('[data-preset-price]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
  // プリセットボタン（秒数）
  app.querySelectorAll('[data-preset-seconds]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const form = btn.closest('form');
      form.querySelector('[name=unitSeconds]').value = btn.dataset.presetSeconds;
      btn.parentElement.querySelectorAll('[data-preset-seconds]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // 前売りトグルボタン
  app.querySelectorAll('[data-advance-toggle]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const form = btn.closest('form');
      const hidden = form.querySelector('[name=isAdvance]');
      const block = form.querySelector('[data-advance-block]');
      const isNowOn = hidden.value !== '1';
      hidden.value = isNowOn ? '1' : '0';
      btn.classList.toggle('active', isNowOn);
      btn.textContent = isNowOn ? '前売り：ON' : '前売り：OFF';
      block.style.display = isNowOn ? '' : 'none';
      if(isNowOn){
        // ONにした時、単価＋デフォルト手数料を前売り単価にセット
        const cfg = TYPE_CONFIG[type];
        const feeBtn = block.querySelector('[data-advance-fee].active') || block.querySelector('[data-advance-fee]');
        const fee = feeBtn ? Number(feeBtn.dataset.advanceFee) : cfg.defaultAdvanceFee;
        const basePrice = Number(form.querySelector('[name=unitPrice]').value) || cfg.defaultPrice;
        const advPriceField = form.querySelector('[name=advancePrice]');
        if(advPriceField && !advPriceField.dataset.touched){
          advPriceField.value = basePrice + fee;
        }
      }
    });
  });

  // 前売り手数料プリセットボタン
  app.querySelectorAll('[data-advance-fee]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const form = btn.closest('form');
      const cfg = TYPE_CONFIG[type];
      const basePrice = Number(form.querySelector('[name=unitPrice]').value) || cfg.defaultPrice;
      const fee = Number(btn.dataset.advanceFee);
      form.querySelector('[name=advancePrice]').value = basePrice + fee;
      btn.parentElement.querySelectorAll('[data-advance-fee]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // 前売り単価を手動で編集したら自動上書きしない
  const advancePriceField = app.querySelector('[name=advancePrice]');
  if(advancePriceField){
    advancePriceField.addEventListener('input', ()=>{ advancePriceField.dataset.touched = '1'; });
  }

  // 大カテゴリ選択時に小カテゴリの選択肢を絞り込む
  app.querySelectorAll('[data-major-select]').forEach(sel=>{
    sel.addEventListener('change', ()=>{
      const form = sel.closest('form');
      const minorSel = form.querySelector('[data-minor-select]');
      const majorId = sel.value;
      const opts = minorCategories.filter(m=>m.majorId===majorId);
      minorSel.innerHTML = '<option value="">（未設定）</option>' +
        opts.map(m=>`<option value="${m.id}">${escapeHtml(m.name)}</option>`).join('');
    });
  });

  // ハピカの種類を新規追加
  app.querySelectorAll('[data-add-hapica-kind]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const form = btn.closest('form');
      const input = form.querySelector('[data-new-hapica-kind]');
      const name = (input.value || '').trim();
      if(!name){ alert('新しい種類名を入力してください。'); return; }
      if(!hapicaKinds.includes(name)){
        hapicaKinds.push(name);
        saveData();
      }
      const kindSelect = form.querySelector('[data-hapica-kind-select]');
      if(kindSelect){
        kindSelect.innerHTML = hapicaKinds.map(k=>`<option value="${escapeHtml(k)}">${escapeHtml(k)}</option>`).join('');
        kindSelect.value = name;
      }
      input.value = '';
    });
  });

  // フォーム送信
  const form = app.querySelector('form.entry-form');
  if(form){
    form.addEventListener('submit', (ev)=>{
      ev.preventDefault();
      const fd = new FormData(form);
      const cfg = TYPE_CONFIG[type];
      const editingId = form.dataset.editing || null;

      const venueSelect = form.querySelector('[name=venueId]');
      const majorSelect = form.querySelector('[name=categoryMajorId]');
      const minorSelect = form.querySelector('[name=categoryMinorId]');

      const entry = {
        id: editingId || uid(),
        type: type,
        date: form.dataset.date,
        venueId: (venueSelect && venueSelect.value) ? venueSelect.value : undefined,
        categoryMajorId: (majorSelect && majorSelect.value) ? majorSelect.value : undefined,
        categoryMinorId: (minorSelect && minorSelect.value) ? minorSelect.value : undefined,
        event: (fd.get('event')||'').trim(),
        count: Number(fd.get('count')) || 0,
        unitPrice: Number(fd.get('unitPrice')) || 0,
      };
      if(cfg.hasSeconds){
        entry.unitSeconds = Number(fd.get('unitSeconds')) || 0;
      }
      if(cfg.hasKind){
        const kindSelect = form.querySelector('[name=hapicaCategory]');
        const kindValue = (kindSelect && kindSelect.value) ? kindSelect.value : 'その他';
        entry.hapicaCategory = kindValue;
        if(!hapicaKinds.includes(kindValue)){
          hapicaKinds.push(kindValue);
        }
      }
      if(cfg.hasAdvance){
        const isAdvance = fd.get('isAdvance') === '1';
        entry.isAdvance = isAdvance;
        if(isAdvance){
          entry.advanceCount = Number(fd.get('advanceCount')) || 0;
          entry.advancePrice = Number(fd.get('advancePrice')) || 0;
          const feeBtnActive = form.querySelector('[data-advance-fee].active');
          entry.advanceFee = feeBtnActive ? Number(feeBtnActive.dataset.advanceFee) : cfg.defaultAdvanceFee;
        }else{
          entry.advanceCount = 0;
          entry.advancePrice = 0;
          entry.advanceFee = undefined;
        }
      }

      if(editingId){
        const idx = records.findIndex(r=>r.id===editingId);
        if(idx>=0) records[idx] = entry;
      }else{
        records.push(entry);
      }
      saveData();
      state.editingId[type] = null;
      renderMain();
    });
  }
}

function renderAggTabHtml(){
  const years = Array.from(new Set(records.map(r=>r.date.slice(0,4)))).sort();
  if(years.length===0) years.push(String(today.getFullYear()));

  const yearOptions = years.map(y=>`<option value="${y}" ${Number(y)===aggState.y?'selected':''}>${y}年</option>`).join('');
  const monthOptions = Array.from({length:12},(_,i)=>i+1).map(m=>
    `<option value="${m}" ${m===aggState.m?'selected':''}>${m}月</option>`
  ).join('');

  const filtered = getFilteredRecords();
  const totals = computeTotals(filtered);
  const series = computeCountSeries();

  return `
    <div class="card">
      <h2>集計</h2>
      <div class="agg-controls">
        <select id="aggMode">
          <option value="month" ${aggState.mode==='month'?'selected':''}>月別</option>

      </div>

      <h3>枚数の推移（${escapeHtml(series.unitLabel)}別・全種類合計）</h3>
      <div class="chart-wrap">
        ${renderBarChartSvg(series.labels, series.values)}
      </div>

      <h3>2ショット・手売り・握手（合計）</h3>
      <div class="totals-grid">
        <div class="total-box time"><div class="label">合計秒数</div><div class="value">${formatSeconds(totals.shotSeconds)}</div></div>
        <div class="total-box money"><div class="label">合計金額</div><div class="value">${formatYen(totals.shotMoney)}</div></div>
      </div>

      <h3>ハピカ</h3>
      <div class="totals-grid">

        <div class="total-box money"><div class="label">合計金額</div><div class="value">${formatYen(totals.hapicaMoney)}</div></div>
      </div>

      <h3>種類別 内訳</h3>
      <table class="breakdown">
        <thead><tr><th>種類</th><th>枚数</th><th>秒数</th><th>金額</th></tr></thead>
        <tbody>
          ${TYPE_ORDER.map(t=>{
            const cfg = TYPE_CONFIG[t];
            const list = filtered.filter(r=>r.type===t);
            const advCntOf = e => (cfg.hasAdvance && e.isAdvance && e.advanceCount) ? Number(e.advanceCount) : 0;
            const advMoneyOf = e => (cfg.hasAdvance && e.isAdvance && e.advanceCount) ? Number(e.advanceCount)*Number(e.advancePrice||0) : 0;
            const cnt = list.reduce((s,e)=>s+Number(e.count||0)+advCntOf(e),0);
            const money = list.reduce((s,e)=>s+Number(e.count||0)*Number(e.unitPrice||0)+advMoneyOf(e),0);
            const sec = cfg.hasSeconds ? list.reduce((s,e)=>s+(Number(e.count||0)+advCntOf(e))*Number(e.unitSeconds||0),0) : null;
            return `<tr><td>${cfg.label}</td><td>${cnt}枚</td><td>${sec!==null ? formatSeconds(sec) : '－'}</td><td>${formatYen(money)}</td></tr>`;
          }).join('')}
          <tr style="font-weight:800;"><td>総合計</td><td>${totals.allCount}枚</td><td>${formatSeconds(totals.shotSeconds)}</td><td>${formatYen(totals.shotMoney + totals.hapicaMoney)}</td></tr>
        </tbody>
      </table>
    </div>
  `;
}

function computeCountSeries(){
  if(aggState.mode === 'month'){
    const y = aggState.y, m = aggState.m;
    const daysInMonth = new Date(y, m, 0).getDate();
    const labels = [];
    const values = new Array(daysInMonth).fill(0);
    for(let d=1; d<=daysInMonth; d++) labels.push(String(d));
    records.forEach(r=>{
      const ry = Number(r.date.slice(0,4)), rm = Number(r.date.slice(5,7)), rd = Number(r.date.slice(8,10));
      if(ry===y && rm===m && rd>=1 && rd<=daysInMonth){
        values[rd-1] += entryTotals(r).count;
      }
    });
    return { labels, values, unitLabel: '日' };
  }
  if(aggState.mode === 'year'){
    const y = aggState.y;
    const labels = Array.from({length:12},(_,i)=>(i+1)+'月');
    const values = new Array(12).fill(0);
    records.forEach(r=>{
      const ry = Number(r.date.slice(0,4)), rm = Number(r.date.slice(5,7));
      if(ry===y && rm>=1 && rm<=12){
        values[rm-1] += entryTotals(r).count;
      }
    });
    return { labels, values, unitLabel: '月' };
  }
  // all
  let years = Array.from(new Set(records.map(r=>r.date.slice(0,4)))).sort();
  if(years.length===0) years.push(String(today.getFullYear()));
  const values = years.map(()=>0);
  records.forEach(r=>{
    const idx = years.indexOf(r.date.slice(0,4));
    if(idx>=0) values[idx] += entryTotals(r).count;
  });
  return { labels: years.map(y=>y+'年'), values, unitLabel: '年' };
}

function renderBarChartSvg(labels, values){
  const w = 640, h = 200;
  const paddingLeft = 34, paddingBottom = 26, paddingTop = 16, paddingRight = 10;
  const chartW = w - paddingLeft - paddingRight;
  const chartH = h - paddingTop - paddingBottom;
  const n = Math.max(1, values.length);
  const maxVal = Math.max(1, ...values);
  const slot = chartW / n;
  const barGap = slot > 10 ? 3 : 1;
  const barW = Math.max(1.5, slot - barGap);
  const showEvery = n <= 14 ? 1 : Math.ceil(n / 12);

  let bars = '';
  let labelsSvg = '';
  values.forEach((v, i)=>{
    const barH = maxVal > 0 ? (v / maxVal) * chartH : 0;
    const x = paddingLeft + i * slot + barGap / 2;
    const y = paddingTop + (chartH - barH);
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0,barH).toFixed(1)}" fill="url(#barGrad)" rx="2"></rect>`;
    if(i % showEvery === 0 || i === values.length - 1){
      const lx = x + barW / 2;
      labelsSvg += `<text x="${lx.toFixed(1)}" y="${h - 8}" font-size="9" fill="#565f77" text-anchor="middle">${escapeHtml(String(labels[i]))}</text>`;
    }
  });

  if(values.every(v=>v===0)){
    return `<p class="empty-msg">この期間の記録がありません。</p>`;
  }

  return `
    <svg viewBox="0 0 ${w} ${h}" class="count-chart-svg" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8a5fc2"/>
          <stop offset="100%" stop-color="#6a3fa0"/>
        </linearGradient>
      </defs>
      <line x1="${paddingLeft}" y1="${paddingTop}" x2="${w-paddingRight}" y2="${paddingTop}" stroke="#dcd8c8" stroke-dasharray="3,3"/>
      <text x="${paddingLeft-4}" y="${paddingTop+4}" font-size="9" fill="#565f77" text-anchor="end">${formatNumber(maxVal)}</text>
      <line x1="${paddingLeft}" y1="${paddingTop+chartH}" x2="${w-paddingRight}" y2="${paddingTop+chartH}" stroke="#b7b3a2"/>
      ${bars}
      ${labelsSvg}
    </svg>
  `;
}

function getFilteredRecords(){
  return records.filter(r=>{
    const y = Number(r.date.slice(0,4));
    const m = Number(r.date.slice(5,7));
    if(aggState.mode==='all') return true;
    if(aggState.mode==='year') return y===aggState.y;
    if(aggState.mode==='month') return y===aggState.y && m===aggState.m;
    return true;
  });
}

function computeTotals(list){
  const shotTypes = ['2shot','tenuri','akushu'];
  let shotSeconds=0, shotMoney=0, hapicaCount=0, hapicaMoney=0, allCount=0;
  list.forEach(r=>{
    const advCount = (r.isAdvance && r.advanceCount) ? Number(r.advanceCount) : 0;
    const advMoney = (r.isAdvance && r.advanceCount) ? Number(r.advanceCount) * Number(r.advancePrice||0) : 0;
    allCount += Number(r.count||0) + advCount;
    if(shotTypes.includes(r.type)){
      shotSeconds += (Number(r.count||0) + advCount) * Number(r.unitSeconds||0);
      shotMoney += Number(r.count||0) * Number(r.unitPrice||0) + advMoney;
    }else if(r.type==='hapica'){
      hapicaCount += Number(r.count||0);
      hapicaMoney += Number(r.count||0) * Number(r.unitPrice||0);
    }
  });
  return { shotSeconds, shotMoney, hapicaCount, hapicaMoney, allCount };
}

function attachDataEvents(){
  const app = document.getElementById('app');

  app.querySelector('#exportBtn').addEventListener('click', ()=>{
    const payload = {
      appName: 'oshi-record-app',
      exportedAt: new Date().toISOString(),
      records: records,
      venues: venues,
      majorCategories: majorCategories,
      minorCategories: minorCategories,
      hapicaKinds: hapicaKinds
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date();
    const fname = 'oshi-record-' + ts.getFullYear() + pad2(ts.getMonth()+1) + pad2(ts.getDate()) + '.json';
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  app.querySelector('#importAddInput').addEventListener('change', (ev)=>{
    handleImportFile(ev.target.files[0], 'add');
    ev.target.value = '';
  });
  app.querySelector('#importReplaceInput').addEventListener('change', (ev)=>{
    handleImportFile(ev.target.files[0], 'replace');
    ev.target.value = '';
  });

  app.querySelector('#clearBtn').addEventListener('click', ()=>{

    records = [];
    venues = [];
    majorCategories = [];
    minorCategories = [];
    hapicaKinds = DEFAULT_HAPICA_KINDS.slice();
    saveData();
    renderMain();
  });
}

function handleImportFile(file, mode){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const parsed = JSON.parse(e.target.result);
      const incoming = Array.isArray(parsed) ? parsed : parsed.records;
      if(!Array.isArray(incoming)) throw new Error('形式が不正です');
      const incomingVenues = Array.isArray(parsed.venues) ? parsed.venues : [];
      const incomingMajor = Array.isArray(parsed.majorCategories) ? parsed.majorCategories
        : (Array.isArray(parsed.eventCategories) ? parsed.eventCategories : []);
      const incomingMinor = Array.isArray(parsed.minorCategories) ? parsed.minorCategories : [];
      const incomingHapicaKinds = Array.isArray(parsed.hapicaKinds) ? parsed.hapicaKinds : [];

      // 最低限のバリデーション
      const cleaned = incoming.filter(r => r && r.type && r.date && TYPE_CONFIG[r.type]).map(r=>({
        id: r.id || uid(),
        type: r.type,
        date: r.date,
        location: r.location || '',
        venueId: r.venueId || undefined,
        categoryMajorId: r.categoryMajorId || r.categoryId || undefined,
        categoryMinorId: r.categoryMinorId || undefined,
        event: r.event || '',
        count: Number(r.count) || 0,
        unitPrice: Number(r.unitPrice) || 0,
        unitSeconds: r.unitSeconds!==undefined ? Number(r.unitSeconds) : undefined,
        hapicaCategory: r.hapicaCategory || undefined,
        isAdvance: !!r.isAdvance,
        advanceCount: r.advanceCount!==undefined ? Number(r.advanceCount) : undefined,
        advancePrice: r.advancePrice!==undefined ? Number(r.advancePrice) : undefined,
        advanceFee: r.advanceFee!==undefined ? Number(r.advanceFee) : undefined
      }));
      const cleanedVenues = incomingVenues.filter(v=>v && v.name).map(v=>({
        id: v.id || uid(), name: v.name, city: v.city || ''
      }));
      const cleanedMajor = incomingMajor.filter(c=>c && c.name).map(c=>({
        id: c.id || uid(), name: c.name
      }));
      const cleanedMinor = incomingMinor.filter(c=>c && c.name && c.majorId).map(c=>({
        id: c.id || uid(), name: c.name, majorId: c.majorId
      }));

      if(mode==='replace'){
        if(!confirm('現在のデータを削除して、インポートしたデータに置き換えます。よろしいですか？')) return;
        records = cleaned;
        venues = cleanedVenues;
        majorCategories = cleanedMajor;
        minorCategories = cleanedMinor;
        hapicaKinds = incomingHapicaKinds.length > 0 ? incomingHapicaKinds.slice() : DEFAULT_HAPICA_KINDS.slice();
      }else{
        // 追加：同じidが既にあれば上書き、なければ追加
        cleaned.forEach(nr=>{
          const idx = records.findIndex(r=>r.id===nr.id);
          if(idx>=0) records[idx] = nr; else records.push(nr);
        });
        cleanedVenues.forEach(nv=>{
          const idx = venues.findIndex(v=>v.id===nv.id);
          if(idx>=0) venues[idx] = nv; else venues.push(nv);
        });
        cleanedMajor.forEach(nc=>{
          const idx = majorCategories.findIndex(c=>c.id===nc.id);
          if(idx>=0) majorCategories[idx] = nc; else majorCategories.push(nc);
        });
        cleanedMinor.forEach(nc=>{
          const idx = minorCategories.findIndex(c=>c.id===nc.id);
          if(idx>=0) minorCategories[idx] = nc; else minorCategories.push(nc);
        });
        incomingHapicaKinds.forEach(k=>{
          if(k && !hapicaKinds.includes(k)) hapicaKinds.push(k);
        });
      }
      saveData();
      renderMain();
      alert('インポートが完了しました（記録 ' + cleaned.length + ' 件）。');
    }catch(err){
      console.error(err);
      alert('インポートに失敗しました。ファイルの形式をご確認ください。');
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function attachVenuesEvents(){
  const app = document.getElementById('app');

  const searchInput = app.querySelector('#venueSearch');
  const searchBtn = app.querySelector('#venueSearchBtn');
  const runVenueSearch = ()=>{
    venueState.search = searchInput.value;
    venueState.page = 1;
    renderMain();
  };
  if(searchBtn){
    searchBtn.addEventListener('click', runVenueSearch);
  }
  if(searchInput){
    searchInput.addEventListener('keydown', (ev)=>{
      if(ev.key === 'Enter'){
        ev.preventDefault();
        runVenueSearch();
      }
    });
  }
  app.querySelectorAll('[data-page-prev="venue"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ venueState.page -= 1; renderMain(); });
  });
  app.querySelectorAll('[data-page-next="venue"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ venueState.page += 1; renderMain(); });
  });

  app.querySelectorAll('[data-venue-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      venueState.editingId = btn.dataset.venueEdit;
      renderMain();
    });
  });
  app.querySelectorAll('[data-venue-delete]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const useCount = records.filter(r=>r.venueId===btn.dataset.venueDelete).length;
      const msg = useCount > 0
        ? `この会場は${useCount}件の記録で使用されています。削除すると記録側の会場情報は「未設定」になります。削除しますか？`
        : 'この会場を削除しますか？';
      if(!confirm(msg)) return;
      venues = venues.filter(v=>v.id!==btn.dataset.venueDelete);
      records.forEach(r=>{ if(r.venueId===btn.dataset.venueDelete) r.venueId = undefined; });
      saveData();
      renderMain();
    });
  });

  if(cancelBtn){
    cancelBtn.addEventListener('click', ()=>{ venueState.editingId = null; renderMain(); });
  }

  const form = app.querySelector('#venueForm');
  if(form){
    form.addEventListener('submit', (ev)=>{
      ev.preventDefault();
      const fd = new FormData(form);
      const name = (fd.get('name')||'').trim();
      if(!name){ alert('会場名を入力してください。'); return; }
      const city = (fd.get('city')||'').trim();
      const editingId = form.dataset.editing || null;
      if(editingId){
        const v = findVenue(editingId);
        if(v){ v.name = name; v.city = city; }
      }else{
        venues.push({ id: uid(), name, city });
      }
      saveData();
      venueState.editingId = null;
      renderMain();
    });
  }
}

        ${majorEditing ? '<button type="button" class="cancel-edit" id="majorCategoryCancelEdit">編集をやめる</button>' : ''}
      </form>
    </div>

    <div class="card">
      <h2>小カテゴリ一覧</h2>
      <div class="agg-controls">
        <input type="text" id="minorCategorySearch" placeholder="小カテゴリ名で検索" value="${escapeHtml(categoryState.minorSearch)}">
        <button type="button" id="minorCategorySearchBtn" class="submit-btn">検索</button>
      </div>
      <p class="hint">該当 ${minorFiltered.length}件</p>
      ${minorListHtml}
      ${minorFiltered.length > 0 ? paginationControlsHtml('minor', minorPageResult.page, minorPageResult.totalPages) : ''}
    </div>
    <div class="card">
      <h3>${minorEditing ? '小カテゴリを編集' : '小カテゴリを追加'}</h3>
      ${majorCategories.length === 0 ? '<p class="empty-msg">先に大カテゴリを登録してください。</p>' : `
      <form class="entry-form" id="minorCategoryForm" data-editing="${minorEditingId||''}">
        <div class="row">
          <label>所属する大カテゴリ
            <select name="majorId">
              ${majorOptionsForMinorForm}
            </select>
          </label>
          <label>小カテゴリ名
            <input type="text" name="name" value="${minorEditing ? escapeHtml(minorEditing.name) : ''}" placeholder="例：全国ツアー">
          </label>
        </div>
        <button type="submit" class="submit-btn">${minorEditing ? '更新する' : '追加する'}</button>
        ${minorEditing ? '<button type="button" class="cancel-edit" id="minorCategoryCancelEdit">編集をやめる</button>' : ''}
      </form>`}
    </div>
  `;
}

function attachCategoriesEvents(){
  const app = document.getElementById('app');

  // 大カテゴリ 検索・ページネーション
  const majorSearchInput = app.querySelector('#majorCategorySearch');
  const majorSearchBtn = app.querySelector('#majorCategorySearchBtn');
  const runMajorSearch = ()=>{
    categoryState.majorSearch = majorSearchInput.value;
    categoryState.majorPage = 1;
    renderMain();
  };
  if(majorSearchBtn){
    majorSearchBtn.addEventListener('click', runMajorSearch);
  }
  if(majorSearchInput){
    majorSearchInput.addEventListener('keydown', (ev)=>{
      if(ev.key === 'Enter'){
        ev.preventDefault();
        runMajorSearch();
      }
    });
  }
  app.querySelectorAll('[data-page-prev="major"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ categoryState.majorPage -= 1; renderMain(); });
  });
  app.querySelectorAll('[data-page-next="major"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ categoryState.majorPage += 1; renderMain(); });
  });

  // 大カテゴリ
  app.querySelectorAll('[data-major-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      categoryState.majorEditingId = btn.dataset.majorEdit;
      renderMain();
    });
  });
  app.querySelectorAll('[data-major-delete]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.majorDelete;
      const minorCount = minorCategories.filter(mc=>mc.majorId===id).length;
      const useCount = records.filter(r=>r.categoryMajorId===id).length;
      let msg = 'この大カテゴリを削除しますか？';
      if(minorCount > 0){
        msg = `この大カテゴリには${minorCount}件の小カテゴリが紐づいています。削除すると小カテゴリも一緒に削除されます。`
          + (useCount > 0 ? `また、${useCount}件の記録のカテゴリ情報が「未設定」になります。` : '')
          + ' よろしいですか？';
      }else if(useCount > 0){
        msg = `この大カテゴリは${useCount}件の記録で使用されています。削除すると記録側のカテゴリ情報は「未設定」になります。削除しますか？`;
      }
      if(!confirm(msg)) return;
      const removedMinorIds = minorCategories.filter(mc=>mc.majorId===id).map(mc=>mc.id);
      minorCategories = minorCategories.filter(mc=>mc.majorId!==id);
      majorCategories = majorCategories.filter(m=>m.id!==id);
      records.forEach(r=>{
        if(r.categoryMajorId===id){ r.categoryMajorId = undefined; r.categoryMinorId = undefined; }
        else if(r.categoryMinorId && removedMinorIds.includes(r.categoryMinorId)){ r.categoryMinorId = undefined; }
      });
      saveData();
      renderMain();
    });
  });
  const majorCancelBtn = app.querySelector('#majorCategoryCancelEdit');
  if(majorCancelBtn){
    majorCancelBtn.addEventListener('click', ()=>{ categoryState.majorEditingId = null; renderMain(); });
  }
  const majorForm = app.querySelector('#majorCategoryForm');
  if(majorForm){
    majorForm.addEventListener('submit', (ev)=>{
      ev.preventDefault();
      const fd = new FormData(majorForm);
      const name = (fd.get('name')||'').trim();
      if(!name){ alert('大カテゴリ名を入力してください。'); return; }
      const editingId = majorForm.dataset.editing || null;
      if(editingId){
        const m = findMajorCategory(editingId);
        if(m){ m.name = name; }
      }else{
        majorCategories.push({ id: uid(), name });
      }
      saveData();
      categoryState.majorEditingId = null;
      renderMain();
    });
  }

  // 小カテゴリ 検索・ページネーション
  const minorSearchInput = app.querySelector('#minorCategorySearch');
  const minorSearchBtn = app.querySelector('#minorCategorySearchBtn');
  const runMinorSearch = ()=>{
    categoryState.minorSearch = minorSearchInput.value;
    categoryState.minorPage = 1;
    renderMain();
  };
  if(minorSearchBtn){
    minorSearchBtn.addEventListener('click', runMinorSearch);
  }
  if(minorSearchInput){
    minorSearchInput.addEventListener('keydown', (ev)=>{
      if(ev.key === 'Enter'){
        ev.preventDefault();
        runMinorSearch();
      }
    });
  }
  app.querySelectorAll('[data-page-prev="minor"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ categoryState.minorPage -= 1; renderMain(); });
  });
  app.querySelectorAll('[data-page-next="minor"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ categoryState.minorPage += 1; renderMain(); });
  });

  // 小カテゴリ
  app.querySelectorAll('[data-minor-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      categoryState.minorEditingId = btn.dataset.minorEdit;
      renderMain();
    });
  });
  app.querySelectorAll('[data-minor-delete]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.minorDelete;
      const useCount = records.filter(r=>r.categoryMinorId===id).length;
      const msg = useCount > 0
        ? `この小カテゴリは${useCount}件の記録で使用されています。削除すると記録側の小カテゴリ情報は「未設定」になります。削除しますか？`
        : 'この小カテゴリを削除しますか？';
      if(!confirm(msg)) return;
      minorCategories = minorCategories.filter(mc=>mc.id!==id);
      records.forEach(r=>{ if(r.categoryMinorId===id) r.categoryMinorId = undefined; });
      saveData();
      renderMain();
    });
  });
  const minorCancelBtn = app.querySelector('#minorCategoryCancelEdit');
  if(minorCancelBtn){
    minorCancelBtn.addEventListener('click', ()=>{ categoryState.minorEditingId = null; renderMain(); });
  }
  const minorForm = app.querySelector('#minorCategoryForm');
  if(minorForm){
    minorForm.addEventListener('submit', (ev)=>{
      ev.preventDefault();
      const fd = new FormData(minorForm);
      const name = (fd.get('name')||'').trim();
      const majorId = fd.get('majorId') || '';
      if(!name){ alert('小カテゴリ名を入力してください。'); return; }
      if(!majorId){ alert('所属する大カテゴリを選択してください。'); return; }
      const editingId = minorForm.dataset.editing || null;
      if(editingId){
        const mc = findMinorCategory(editingId);
        if(mc){ mc.name = name; mc.majorId = majorId; }
      }else{
        minorCategories.push({ id: uid(), name, majorId });
      }
      saveData();
      categoryState.minorEditingId = null;
      renderMain();
    });
  }
}

/* =========================================================
   一覧タブ
========================================================= */
function entryTotals(e){
  const cfg = TYPE_CONFIG[e.type];
  const advCount = (cfg.hasAdvance && e.isAdvance && e.advanceCount) ? Number(e.advanceCount) : 0;
  const advMoney = (cfg.hasAdvance && e.isAdvance && e.advanceCount) ? Number(e.advanceCount) * Number(e.advancePrice||0) : 0;
  const count = Number(e.count||0) + advCount;
  const money = Number(e.count||0) * Number(e.unitPrice||0) + advMoney;
  return { count, money };
}

function renderListTabHtml(){
  const listableTypes = TYPE_ORDER.filter(t=>t!=='hapica');
  const typeOptions = listableTypes.map(t=>`<option value="${t}" ${listState.type===t?'selected':''}>${TYPE_CONFIG[t].label}</option>`).join('');
  const venueOptions = venues.map(v=>`<option value="${v.id}" ${listState.venueId===v.id?'selected':''}>${escapeHtml(v.name)}</option>`).join('');
  const cityList = Array.from(new Set(venues.map(v=>(v.city||'').trim()).filter(c=>c))).sort((a,b)=>a.localeCompare(b,'ja'));
  const cityOptions = cityList.map(c=>`<option value="${escapeHtml(c)}" ${listState.city===c?'selected':''}>${escapeHtml(c)}</option>`).join('');
  const majorOptions = majorCategories.map(m=>`<option value="${m.id}" ${listState.majorId===m.id?'selected':''}>${escapeHtml(m.name)}</option>`).join('');
  const minorCandidates = listState.majorId !== 'all' ? minorCategories.filter(mc=>mc.majorId===listState.majorId) : minorCategories;
  const minorOptions = minorCandidates.map(mc=>{
    const parent = findMajorCategory(mc.majorId);
    return `<option value="${mc.id}" ${listState.minorId===mc.id?'selected':''}>${escapeHtml(mc.name)}${parent ? '（'+escapeHtml(parent.name)+'）' : ''}</option>`;
  }).join('');

  let filtered = records.filter(r=>{
    if(r.type==='hapica') return false; // ハピカは専用タブで表示
    if(listState.type!=='all' && r.type!==listState.type) return false;
    if(listState.venueId!=='all' && r.venueId!==listState.venueId) return false;
    if(listState.city!=='all'){
      const v = r.venueId ? findVenue(r.venueId) : null;
      if(!v || (v.city||'').trim() !== listState.city) return false;
    }
    if(listState.majorId!=='all' && r.categoryMajorId!==listState.majorId) return false;
    if(listState.minorId!=='all' && r.categoryMinorId!==listState.minorId) return false;
    return true;
  });
  filtered.sort((a,b)=> listState.sort==='desc' ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date));

  const totalCount = filtered.reduce((s,e)=>s+entryTotals(e).count,0);
  const totalMoney = filtered.reduce((s,e)=>s+entryTotals(e).money,0);

  const pageSize = listState.pageSize;
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  if(listState.page > totalPages) listState.page = totalPages;
  if(listState.page < 1) listState.page = 1;
  const startIdx = (listState.page - 1) * pageSize;
  const pageItems = filtered.slice(startIdx, startIdx + pageSize);

  const rowsHtml = pageItems.length === 0
    ? `<tr><td colspan="7" class="empty-msg">条件に合う記録がありません。</td></tr>`
    : pageItems.map(e=>{
        const cfg = TYPE_CONFIG[e.type];
        const venue = e.venueId ? findVenue(e.venueId) : null;
        const venueLabel = venue ? escapeHtml(venue.name) + (venue.city ? `（${escapeHtml(venue.city)}）` : '') : (e.location ? escapeHtml(e.location) : '－');
        const majorCat = e.categoryMajorId ? findMajorCategory(e.categoryMajorId) : null;
        const minorCat = e.categoryMinorId ? findMinorCategory(e.categoryMinorId) : null;
        const catLabel = majorCat ? escapeHtml(majorCat.name) + (minorCat ? '／'+escapeHtml(minorCat.name) : '') : '－';
        const totals = entryTotals(e);
        return `<tr>
          <td>${e.date}</td>
          <td>${cfg.label}</td>
          <td>${venueLabel}</td>
          <td>${catLabel}</td>
          <td>${escapeHtml(e.event||'－')}</td>
          <td>${formatNumber(totals.count)}</td>
          <td>${formatNumber(totals.money)}</td>
        </tr>`;
      }).join('');

  return `
    <div class="card">
      <h2>記録一覧（ハピカを除く）</h2>
      <div class="agg-controls">
        <select id="listType">
          <option value="all" ${listState.type==='all'?'selected':''}>すべての種類</option>
          ${typeOptions}
        </select>
        <select id="listVenue">
          <option value="all" ${listState.venueId==='all'?'selected':''}>すべての会場</option>
          ${venueOptions}
        </select>
        <select id="listCity">
          <option value="all" ${listState.city==='all'?'selected':''}>すべての都市</option>
          ${cityOptions}
        </select>
        <select id="listMajor">
          <option value="all" ${listState.majorId==='all'?'selected':''}>すべての大カテゴリ</option>
          ${majorOptions}
        </select>
        <select id="listMinor">
          <option value="all" ${listState.minorId==='all'?'selected':''}>すべての小カテゴリ</option>
          ${minorOptions}
        </select>
        <select id="listSort">
          <option value="desc" ${listState.sort==='desc'?'selected':''}>新しい順</option>
          <option value="asc" ${listState.sort==='asc'?'selected':''}>古い順</option>
        </select>
      </div>
      <p class="hint">該当 ${filtered.length}件 ・ 合計 ${formatNumber(totalCount)} ・ 合計金額 ${formatNumber(totalMoney)}</p>
      <div class="list-table-wrap">
        <table class="breakdown list-table">
          <thead><tr><th>日付</th><th>種類</th><th>会場</th><th>カテゴリ</th><th>イベント名</th><th>枚数</th><th>金額</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
      <div class="pagination">
        <button type="button" id="listPrevPage" ${listState.page<=1?'disabled':''}>＜ 前へ</button>
        <span class="page-info">${listState.page} / ${totalPages} ページ</span>
        <button type="button" id="listNextPage" ${listState.page>=totalPages?'disabled':''}>次へ ＞</button>
      </div>
    </div>
  `;
}

function attachListEvents(){
  const app = document.getElementById('app');
  app.querySelector('#listType').addEventListener('change', (ev)=>{ listState.type = ev.target.value; listState.page = 1; renderMain(); });
  app.querySelector('#listVenue').addEventListener('change', (ev)=>{ listState.venueId = ev.target.value; listState.page = 1; renderMain(); });
  app.querySelector('#listCity').addEventListener('change', (ev)=>{ listState.city = ev.target.value; listState.page = 1; renderMain(); });
  app.querySelector('#listMajor').addEventListener('change', (ev)=>{ listState.majorId = ev.target.value; listState.minorId = 'all'; listState.page = 1; renderMain(); });
  app.querySelector('#listMinor').addEventListener('change', (ev)=>{ listState.minorId = ev.target.value; listState.page = 1; renderMain(); });
  app.querySelector('#listSort').addEventListener('change', (ev)=>{ listState.sort = ev.target.value; listState.page = 1; renderMain(); });
  app.querySelector('#listPrevPage').addEventListener('click', ()=>{ listState.page -= 1; renderMain(); });
  app.querySelector('#listNextPage').addEventListener('click', ()=>{ listState.page += 1; renderMain(); });
}

/* =========================================================
   ハピカ一覧タブ（カテゴリ別）
========================================================= */
function renderHapicaListTabHtml(){
  const venueOptions = venues.map(v=>`<option value="${v.id}" ${hapicaListState.venueId===v.id?'selected':''}>${escapeHtml(v.name)}</option>`).join('');
  const cityList = Array.from(new Set(venues.map(v=>(v.city||'').trim()).filter(c=>c))).sort((a,b)=>a.localeCompare(b,'ja'));
  const cityOptions = cityList.map(c=>`<option value="${escapeHtml(c)}" ${hapicaListState.city===c?'selected':''}>${escapeHtml(c)}</option>`).join('');

  let filtered = records.filter(r=>{
    if(r.type!=='hapica') return false;
    if(hapicaListState.venueId!=='all' && r.venueId!==hapicaListState.venueId) return false;
    if(hapicaListState.city!=='all'){
      const v = r.venueId ? findVenue(r.venueId) : null;
      if(!v || (v.city||'').trim() !== hapicaListState.city) return false;
    }
    return true;
  });

  const totalCount = filtered.reduce((s,e)=>s+Number(e.count||0),0);
  const totalMoney = filtered.reduce((s,e)=>s+Number(e.count||0)*Number(e.unitPrice||0),0);

  // 種類ごとにグループ化（未設定は最後に表示）
  const groups = new Map();
  filtered.forEach(r=>{
    const key = r.hapicaCategory || '__none__';
    if(!groups.has(key)) groups.set(key, []);
    groups.get(key).push(r);
  });
  const orderedKeys = hapicaKinds.filter(k=>groups.has(k));
  groups.forEach((v,k)=>{ if(k!=='__none__' && !orderedKeys.includes(k)) orderedKeys.push(k); });
  if(groups.has('__none__')) orderedKeys.push('__none__');

  const groupCardsHtml = orderedKeys.map(key=>{
    const list = groups.get(key).slice().sort((a,b)=>
      hapicaListState.sort==='desc' ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date)
    );
    const title = key!=='__none__' ? key : '未設定';
    const isRemovableKind = key!=='__none__' && hapicaKinds.includes(key);
    const groupCount = list.reduce((s,e)=>s+Number(e.count||0),0);
    const groupMoney = list.reduce((s,e)=>s+Number(e.count||0)*Number(e.unitPrice||0),0);

    const rowsHtml = list.map(e=>{
      const venue = e.venueId ? findVenue(e.venueId) : null;
      const venueLabel = venue ? escapeHtml(venue.name) + (venue.city ? `（${escapeHtml(venue.city)}）` : '') : (e.location ? escapeHtml(e.location) : '－');
      const majorCat = e.categoryMajorId ? findMajorCategory(e.categoryMajorId) : null;
      const minorCat = e.categoryMinorId ? findMinorCategory(e.categoryMinorId) : null;
      const catLabel = majorCat ? escapeHtml(majorCat.name) + (minorCat ? '／'+escapeHtml(minorCat.name) : '') : '－';
      const money = Number(e.count||0) * Number(e.unitPrice||0);
      return `<tr>
        <td>${e.date}</td>
        <td>${venueLabel}</td>
        <td>${catLabel}</td>
        <td>${escapeHtml(e.event||'－')}</td>
        <td>${formatNumber(e.count)}</td>
        <td>${formatNumber(money)}</td>
      </tr>`;
    }).join('');

    return `
      <div class="card">
        <div class="group-title-row">
          <h2>${escapeHtml(title)}</h2>
          ${isRemovableKind ? `<button type="button" class="danger-outline-btn" data-delete-hapica-kind="${escapeHtml(key)}">この種類を削除</button>` : ''}
        </div>
        <p class="hint">該当 ${list.length}件 ・ 合計 ${formatNumber(groupCount)} ・ 合計金額 ${formatNumber(groupMoney)}</p>
        <div class="list-table-wrap">
          <table class="breakdown list-table">
            <thead><tr><th>日付</th><th>会場</th><th>カテゴリ</th><th>イベント名</th><th>枚数</th><th>金額</th></tr></thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      </div>
    `;
  }).join('');

  const unusedKindsHtml = hapicaKinds.filter(k=>!groups.has(k)).map(k=>`
    <div class="entry-row">
      <div class="info"><div class="line1">${escapeHtml(k)}</div><div class="line2">この種類はまだ記録がありません</div></div>
      <div class="actions"><button data-delete-hapica-kind="${escapeHtml(k)}">削除</button></div>
    </div>
  `).join('');

  return `
    <div class="card">
      <h2>ハピカ一覧（種類別）</h2>
      <div class="agg-controls">
        <select id="hapicaListVenue">
          <option value="all" ${hapicaListState.venueId==='all'?'selected':''}>すべての会場</option>
          ${venueOptions}
        </select>
        <select id="hapicaListCity">
          <option value="all" ${hapicaListState.city==='all'?'selected':''}>すべての都市</option>
          ${cityOptions}
        </select>
        <select id="hapicaListSort">
          <option value="desc" ${hapicaListState.sort==='desc'?'selected':''}>新しい順</option>
          <option value="asc" ${hapicaListState.sort==='asc'?'selected':''}>古い順</option>
        </select>
      </div>
      <p class="hint">全体：該当 ${filtered.length}件 ・ 合計 ${formatNumber(totalCount)} ・ 合計金額 ${formatNumber(totalMoney)}</p>
    </div>
    ${groupCardsHtml || '<div class="card"><p class="empty-msg">条件に合う記録がありません。</p></div>'}
    ${unusedKindsHtml ? `<div class="card"><h3>記録のない種類</h3>${unusedKindsHtml}</div>` : ''}
  `;
}

function attachHapicaListEvents(){
  const app = document.getElementById('app');
  app.querySelector('#hapicaListVenue').addEventListener('change', (ev)=>{ hapicaListState.venueId = ev.target.value; renderMain(); });
  app.querySelector('#hapicaListCity').addEventListener('change', (ev)=>{ hapicaListState.city = ev.target.value; renderMain(); });
  app.querySelector('#hapicaListSort').addEventListener('change', (ev)=>{ hapicaListState.sort = ev.target.value; renderMain(); });

  app.querySelectorAll('[data-delete-hapica-kind]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const kind = btn.dataset.deleteHapicaKind;
      const useCount = records.filter(r=>r.type==='hapica' && r.hapicaCategory===kind).length;
      const msg = useCount > 0
        ? `「${kind}」は${useCount}件の記録で使われています。削除すると新規記録の選択肢からは消えますが、既存の記録の表示は「${kind}」のまま残ります。削除しますか？`
        : `「${kind}」を削除しますか？`;
      if(!confirm(msg)) return;
      hapicaKinds = hapicaKinds.filter(k=>k!==kind);
      saveData();
      renderMain();
    });
  });
}
